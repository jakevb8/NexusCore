      # - name: Build API for Cloud Functions
      #   run: |
      #     cd apps/api
      #     npm run build
      #
      # - name: Deploy API to Cloud Functions
      #   run: npx firebase-tools deploy --only functions --project nexus-core-rms --token "$FIREBASE_TOKEN"
      #   env:
      #     FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
